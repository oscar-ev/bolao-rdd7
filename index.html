<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão · Brasileirão 2026 · Rodada 7</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --green-dim: #00a844;
    --gold: #ffd600;
    --red: #ff1744;
    --bg: #0a0e0c;
    --surface: #111714;
    --card: #16201a;
    --border: #1f2d24;
    --text: #e8f0ea;
    --muted: #5a7060;
    --accent: #00ff87;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,200,83,0.12) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300c853' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 2.5rem 0 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0.25rem 0.9rem;
    border-radius: 2px;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: #fff;
  }

  h1 span { color: var(--green); }

  .subtitle {
    margin-top: 0.4rem;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  /* SCORING INFO */
  .scoring-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin: 1.2rem 0 0;
    flex-wrap: wrap;
  }

  .score-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.35rem 0.9rem;
    font-size: 0.8rem;
  }

  .score-pill .pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--gold);
  }

  /* FORM */
  .form-section { padding: 2rem 0; }

  .participant-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .participant-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    color: var(--green);
    margin-bottom: 1rem;
  }

  .name-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  label { display: block; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.6rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--green); }

  /* MATCHES GRID */
  .matches-grid {
    display: grid;
    gap: 0.8rem;
  }

  .match-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0.6rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    transition: border-color 0.2s;
  }

  .match-row:hover { border-color: #2a3e2f; }

  .team-name {
    font-size: 0.88rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-home { text-align: right; }
  .team-away { text-align: left; }

  .score-inputs {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    justify-content: center;
  }

  .score-inputs input {
    width: 2.4rem;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    padding: 0.3rem 0;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    -moz-appearance: textfield;
  }

  .score-inputs input::-webkit-inner-spin-button,
  .score-inputs input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .score-inputs input:focus { border-color: var(--green); color: var(--accent); }

  .vs { color: var(--muted); font-size: 0.7rem; }

  .match-time {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* BUTTONS */
  .actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.2rem;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 140px;
    padding: 0.75rem 1.2rem;
    border-radius: 7px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--green);
    color: #000;
  }

  .btn-primary:hover { background: var(--accent); }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--green); color: var(--green); }

  .btn-export {
    background: var(--gold);
    color: #000;
  }

  /* RESULTS SECTION */
  .results-section {
    padding-bottom: 4rem;
  }

  .results-section h2 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .results-section h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* PARTICIPANT TABLE */
  .participants-list {
    display: grid;
    gap: 0.8rem;
  }

  .participant-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .participant-entry:hover { border-color: #2a3e2f; }

  .entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.2rem;
    cursor: pointer;
    user-select: none;
  }

  .entry-name {
    font-weight: 700;
    font-size: 1rem;
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .entry-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--gold);
    line-height: 1;
  }

  .entry-score .pts-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .entry-actions { display: flex; gap: 0.4rem; }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 0.3rem 0.5rem;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }

  .btn-icon:hover { border-color: var(--red); color: var(--red); }

  .entry-palpites {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.5rem;
    padding: 0.8rem 1.2rem 1rem;
    border-top: 1px solid var(--border);
  }

  .entry-palpites.open { display: grid; }

  .palpite-item {
    font-size: 0.78rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
  }

  .palpite-item .palpite-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--text);
    white-space: nowrap;
  }

  .palpite-item.exact .palpite-score { color: var(--green); }
  .palpite-item.winner .palpite-score { color: var(--gold); }

  /* RANKING */
  .ranking-section { margin-bottom: 2rem; }

  .ranking-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .rank-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }

  .rank-table th {
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .rank-table td {
    padding: 0.55rem 0.6rem;
    border-bottom: 1px solid #111;
  }

  .rank-table tr:last-child td { border-bottom: none; }

  .rank-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--muted);
    width: 2rem;
  }

  .rank-pos.gold { color: var(--gold); }
  .rank-pos.silver { color: #9e9e9e; }
  .rank-pos.bronze { color: #bf7a3a; }

  .rank-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--green);
    text-align: right;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.9rem; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #000;
    font-weight: 700;
    padding: 0.7rem 1.4rem;
    border-radius: 100px;
    font-size: 0.88rem;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* RESULT ENTRY BADGE */
  .result-badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    margin-left: 0.4rem;
  }

  .result-badge.exact { background: rgba(0,200,83,0.15); color: var(--green); }
  .result-badge.winner { background: rgba(255,214,0,0.15); color: var(--gold); }

  /* RESULTS INPUT */
  .results-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .results-form h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .tab {
    flex: 1;
    padding: 0.7rem;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    letter-spacing: 0.03em;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--green);
    color: #000;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @media (max-width: 600px) {
    .name-row { grid-template-columns: 1fr; }
    .match-row { padding: 0.7rem; }
    .team-name { font-size: 0.78rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">⚽ Brasileirão 2026</div>
    <h1>BOLÃO <span>Rodada 7</span></h1>
    <p class="subtitle">de 38 rodadas · Série A</p>
    <div class="scoring-bar">
      <div class="score-pill"><span class="pts">3</span> pts — Placar exato</div>
      <div class="score-pill"><span class="pts">1</span> pt — Vencedor/Empate certo</div>
      <div class="score-pill"><span class="pts">0</span> pts — Errou</div>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('palpite')">🎯 Registrar Palpite</button>
    <button class="tab" onclick="switchTab('resultados')">🏆 Resultados</button>
    <button class="tab" onclick="switchTab('ranking')">📊 Ranking</button>
  </div>

  <!-- TAB: PALPITE -->
  <div id="tab-palpite" class="tab-content active">
    <div class="participant-card">
      <h2>IDENTIFICAÇÃO</h2>
      <div class="name-row">
        <div>
          <label>Nome</label>
          <input type="text" id="inp-nome" placeholder="Ex: João">
        </div>
        <div>
          <label>Sobrenome</label>
          <input type="text" id="inp-sobrenome" placeholder="Ex: Silva">
        </div>
      </div>

      <h2>SEUS PALPITES</h2>
      <div class="matches-grid" id="matches-grid"></div>

      <div class="actions">
        <button class="btn btn-secondary" onclick="clearForm()">Limpar</button>
        <button class="btn btn-primary" onclick="savePalpite()">💾 Salvar Palpite</button>
        <button class="btn btn-export" onclick="exportJSON()">⬇ Exportar JSON</button>
      </div>
    </div>
  </div>

  <!-- TAB: RESULTADOS -->
  <div id="tab-resultados" class="tab-content">
    <div class="results-form">
      <h3>PLACAR OFICIAL DOS JOGOS</h3>
      <div class="matches-grid" id="official-grid"></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="applyResults()">⚡ Calcular Pontuações</button>
        <button class="btn btn-secondary" onclick="clearResults()">Limpar Resultados</button>
      </div>
    </div>

    <div class="results-section">
      <h2>Participantes</h2>
      <div class="participants-list" id="participants-list">
        <div class="empty-state">
          <div class="icon">🎯</div>
          <p>Nenhum palpite registrado ainda.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: RANKING -->
  <div id="tab-ranking" class="tab-content">
    <div class="results-section ranking-section">
      <h2>Classificação</h2>
      <div id="ranking-table-wrap">
        <div class="empty-state">
          <div class="icon">🏆</div>
          <p>Calcule os resultados para ver o ranking.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const JOGOS = [
  { id: 1,  home: 'Bahia',       away: 'Bragantino',  horario: 'Hoje 19:00'  },
  { id: 2,  home: 'Palmeiras',   away: 'Botafogo',    horario: 'Hoje 19:00'  },
  { id: 3,  home: 'Athletico-PR',away: 'Cruzeiro',    horario: 'Hoje 19:30'  },
  { id: 4,  home: 'Atlético-MG', away: 'São Paulo',   horario: 'Hoje 20:00'  },
  { id: 5,  home: 'Mirassol',    away: 'Coritiba',    horario: 'Hoje 20:00'  },
  { id: 6,  home: 'Santos',      away: 'Internacional',horario: 'Hoje 21:30' },
  { id: 7,  home: 'Vasco da Gama',away: 'Fluminense', horario: 'Hoje 21:30'  },
  { id: 8,  home: 'Grêmio',      away: 'EC Vitória',  horario: 'Amanhã 19:00'},
  { id: 9,  home: 'Flamengo',    away: 'Remo',        horario: 'Amanhã 20:00'},
  { id: 10, home: 'Chapecoense', away: 'Corinthians', horario: 'Amanhã 21:30'},
];

const STORAGE_KEY = 'bolao_r7_2026';
const RESULTS_KEY = 'bolao_r7_results';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

function loadResults() {
  try { return JSON.parse(localStorage.getItem(RESULTS_KEY)) || {}; }
  catch { return {}; }
}

function saveResults(r) {
  localStorage.setItem(RESULTS_KEY, JSON.stringify(r));
}

// ---- RENDER MATCH ROWS ----
function renderMatchGrid(containerId, prefix) {
  const container = document.getElementById(containerId);
  container.innerHTML = JOGOS.map(j => `
    <div class="match-row">
      <div class="team-name team-home">${j.home}</div>
      <div>
        <div class="score-inputs">
          <input type="number" min="0" max="20" id="${prefix}_h_${j.id}" placeholder="0">
          <span class="vs">×</span>
          <input type="number" min="0" max="20" id="${prefix}_a_${j.id}" placeholder="0">
        </div>
        <div class="match-time">${j.horario}</div>
      </div>
      <div class="team-name team-away">${j.away}</div>
    </div>
  `).join('');
}

// ---- GET PALPITE VALUES ----
function getPalpiteValues(prefix) {
  const palpites = {};
  JOGOS.forEach(j => {
    const h = document.getElementById(`${prefix}_h_${j.id}`).value;
    const a = document.getElementById(`${prefix}_a_${j.id}`).value;
    if (h !== '' && a !== '') {
      palpites[j.id] = { home: parseInt(h), away: parseInt(a) };
    }
  });
  return palpites;
}

// ---- SAVE PALPITE ----
function savePalpite() {
  const nome = document.getElementById('inp-nome').value.trim();
  const sobrenome = document.getElementById('inp-sobrenome').value.trim();
  if (!nome || !sobrenome) { showToast('⚠️ Informe nome e sobrenome!'); return; }

  const palpites = getPalpiteValues('p');
  if (Object.keys(palpites).length === 0) { showToast('⚠️ Informe ao menos um palpite!'); return; }

  const data = loadData();
  const key = `${nome} ${sobrenome}`.toLowerCase();
  const existing = data.findIndex(p => p.key === key);

  const entry = { key, nome, sobrenome, palpites, pontos: null, ts: Date.now() };

  if (existing >= 0) {
    if (!confirm(`Já existe palpite de "${nome} ${sobrenome}". Substituir?`)) return;
    data[existing] = entry;
  } else {
    data.push(entry);
  }

  saveData(data);
  showToast(`✅ Palpite de ${nome} ${sobrenome} salvo!`);
  clearForm();
  renderParticipants();
}

function clearForm() {
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-sobrenome').value = '';
  JOGOS.forEach(j => {
    const h = document.getElementById(`p_h_${j.id}`);
    const a = document.getElementById(`p_a_${j.id}`);
    if (h) { h.value = ''; a.value = ''; }
  });
}

// ---- SCORING ----
function calcPontos(palpites, resultados) {
  let pontos = 0;
  let detalhes = {};
  JOGOS.forEach(j => {
    const p = palpites[j.id];
    const r = resultados[j.id];
    if (!p || !r) { detalhes[j.id] = 'sem_resultado'; return; }
    if (p.home === r.home && p.away === r.away) {
      pontos += 3; detalhes[j.id] = 'exact';
    } else if (getOutcome(p) === getOutcome(r)) {
      pontos += 1; detalhes[j.id] = 'winner';
    } else {
      detalhes[j.id] = 'miss';
    }
  });
  return { pontos, detalhes };
}

function getOutcome(s) {
  if (s.home > s.away) return 'H';
  if (s.away > s.home) return 'A';
  return 'D';
}

// ---- APPLY RESULTS ----
function applyResults() {
  const resultados = getPalpiteValues('r');
  if (Object.keys(resultados).length === 0) { showToast('⚠️ Informe ao menos um resultado!'); return; }

  saveResults(resultados);
  const data = loadData();

  data.forEach(p => {
    const calc = calcPontos(p.palpites, resultados);
    p.pontos = calc.pontos;
    p.detalhes = calc.detalhes;
  });

  saveData(data);
  renderParticipants();
  renderRanking();
  showToast('⚡ Pontuações calculadas!');
}

function clearResults() {
  localStorage.removeItem(RESULTS_KEY);
  const data = loadData();
  data.forEach(p => { p.pontos = null; p.detalhes = null; });
  saveData(data);
  JOGOS.forEach(j => {
    const h = document.getElementById(`r_h_${j.id}`);
    const a = document.getElementById(`r_a_${j.id}`);
    if (h) { h.value = ''; a.value = ''; }
  });
  renderParticipants();
  renderRanking();
  showToast('🗑️ Resultados limpos!');
}

// ---- RENDER PARTICIPANTS ----
function renderParticipants() {
  const data = loadData();
  const container = document.getElementById('participants-list');

  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><p>Nenhum palpite registrado ainda.</p></div>';
    return;
  }

  container.innerHTML = data.map((p, idx) => {
    const hasPoints = p.pontos !== null;
    const palpitesHTML = JOGOS.map(j => {
      const pal = p.palpites[j.id];
      const det = p.detalhes ? p.detalhes[j.id] : null;
      if (!pal) return '';
      let cls = det === 'exact' ? 'exact' : det === 'winner' ? 'winner' : '';
      let badge = det === 'exact' ? '<span class="result-badge exact">3pts</span>' :
                  det === 'winner' ? '<span class="result-badge winner">1pt</span>' : '';
      return `<div class="palpite-item ${cls}">
        <span>${j.home} × ${j.away}</span>
        <span class="palpite-score">${pal.home}–${pal.away}${badge}</span>
      </div>`;
    }).join('');

    return `<div class="participant-entry">
      <div class="entry-header" onclick="toggleEntry(${idx})">
        <span class="entry-name">${p.nome} ${p.sobrenome}</span>
        <div class="entry-meta">
          ${hasPoints ? `<div><div class="entry-score">${p.pontos}</div><div class="pts-label">pontos</div></div>` : ''}
          <div class="entry-actions">
            <button class="btn-icon" title="Remover" onclick="removeEntry(event,${idx})">✕</button>
          </div>
        </div>
      </div>
      <div class="entry-palpites" id="palpites-${idx}">
        ${palpitesHTML || '<p style="color:var(--muted);font-size:.8rem">Sem palpites registrados.</p>'}
      </div>
    </div>`;
  }).join('');
}

function toggleEntry(idx) {
  const el = document.getElementById(`palpites-${idx}`);
  el.classList.toggle('open');
}

function removeEntry(e, idx) {
  e.stopPropagation();
  if (!confirm('Remover este participante?')) return;
  const data = loadData();
  data.splice(idx, 1);
  saveData(data);
  renderParticipants();
  renderRanking();
  showToast('🗑️ Participante removido.');
}

// ---- RANKING ----
function renderRanking() {
  const data = loadData().filter(p => p.pontos !== null).sort((a,b) => b.pontos - a.pontos);
  const wrap = document.getElementById('ranking-table-wrap');

  if (data.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><p>Calcule os resultados para ver o ranking.</p></div>';
    return;
  }

  const rows = data.map((p, i) => {
    const posCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
    const exatos = p.detalhes ? Object.values(p.detalhes).filter(v => v === 'exact').length : 0;
    const winners = p.detalhes ? Object.values(p.detalhes).filter(v => v === 'winner').length : 0;
    return `<tr>
      <td class="rank-pos ${posCls}">${medal}</td>
      <td style="font-weight:600">${p.nome} ${p.sobrenome}</td>
      <td style="color:var(--green);font-size:.8rem;text-align:center">${exatos}×3pts</td>
      <td style="color:var(--gold);font-size:.8rem;text-align:center">${winners}×1pt</td>
      <td class="rank-pts">${p.pontos}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table class="rank-table">
    <thead><tr>
      <th>#</th><th>Participante</th><th>Exatos</th><th>Resultado</th><th style="text-align:right">Pts</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ---- EXPORT JSON ----
function exportJSON() {
  const data = loadData();
  if (data.length === 0) { showToast('⚠️ Nenhum dado para exportar!'); return; }
  const blob = new Blob([JSON.stringify({ rodada: 7, temporada: 2026, participantes: data }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bolao-brasileirao-2026-rodada7.json';
  a.click();
  showToast('📁 JSON exportado!');
}

// ---- TABS ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');

  if (tab === 'resultados') renderParticipants();
  if (tab === 'ranking') renderRanking();
}

// ---- TOAST ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ---- RESTORE OFFICIAL RESULTS ----
function restoreOfficialResults() {
  const r = loadResults();
  JOGOS.forEach(j => {
    if (r[j.id]) {
      const h = document.getElementById(`r_h_${j.id}`);
      const a = document.getElementById(`r_a_${j.id}`);
      if (h) { h.value = r[j.id].home; a.value = r[j.id].away; }
    }
  });
}

// ---- INIT ----
renderMatchGrid('matches-grid', 'p');
renderMatchGrid('official-grid', 'r');
restoreOfficialResults();
renderParticipants();
renderRanking();
</script>
</body>
